configs:
  mongo-init:
    file: ./mongo-init.js

services:
  db:
    image: mongo:4.4
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
      - MONGO_PASS=${MONGO_PASS}
    configs:
      - source: mongo-init
        target: /docker-entrypoint-initdb.d/mongo-init.js
    volumes:
      - unifi-db:/data/db
    networks:
      - unifi
    deploy:
      placement:
        constraints:
          - node.labels.unifi == true

  controller:
    image: lscr.io/linuxserver/unifi-network-application:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - MONGO_HOST=db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_USER=unifi
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_AUTHSOURCE=unifi
    volumes:
      - unifi-config:/config
    networks:
      - proxy
      - unifi
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
      - target: 3478
        published: 3478
        protocol: udp
        mode: ingress
      - target: 10001
        published: 10001
        protocol: udp
        mode: ingress
    deploy:
      placement:
        constraints:
          - node.labels.unifi == true
      labels:
        - traefik.enable=true
        - traefik.swarm.network=proxy
        - traefik.http.routers.unifi.rule=Host(`unifi.home.arpa`)
        - traefik.http.routers.unifi.entrypoints=web
        - traefik.http.services.unifi.loadbalancer.server.port=8443
        - traefik.http.services.unifi.loadbalancer.server.scheme=https

volumes:
  unifi-config:
  unifi-db:

networks:
  proxy:
    external: true
  unifi:
    driver: overlay